<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>黑夜盒子｜錄影用動畫舞台</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #080706;
      --panel: rgba(14, 11, 8, .86);
      --line: rgba(201, 145, 47, .32);
      --text: #f3e6ca;
      --muted: #c8b890;
      --accent: #d6a343;
      --res-primary: rgba(230, 54, 42, .92);
      --res-secondary: rgba(255, 178, 112, .78);
      --res-shadow: rgba(130, 0, 0, .52);
      --res-sprite-hue: -18deg;
      --res-sprite-sat: 1.72;
      --res-charge-bright: 1.5;
      --res-wave-bright: 1.12;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      background:
        radial-gradient(circle at 50% -10%, rgba(201, 145, 47, .18), transparent 34%),
        linear-gradient(180deg, #15110c, #050403);
      font-family: "Microsoft JhengHei", "Noto Sans TC", system-ui, sans-serif;
      overflow-x: hidden;
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 12px;
      padding: 12px;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      justify-content: center;
      padding: 10px;
      border: 1px solid var(--line);
      background: var(--panel);
      box-shadow: inset 0 0 24px rgba(0, 0, 0, .34);
    }

    body.controls-hidden .toolbar {
      display: none;
    }

    button,
    select,
    label {
      min-height: 34px;
      color: var(--text);
      font: inherit;
      font-weight: 800;
    }

    button,
    select {
      border: 1px solid rgba(201, 145, 47, .48);
      background: linear-gradient(180deg, #2b2318, #13100c);
    }

    button {
      padding: 0 13px;
      cursor: pointer;
    }

    button:hover,
    select:hover {
      border-color: rgba(239, 203, 118, .78);
      color: #fff4d8;
    }

    select {
      padding: 0 10px;
      min-width: 190px;
    }

    label {
      display: inline-flex;
      gap: 6px;
      align-items: center;
      color: var(--muted);
    }

    .workspace {
      min-height: 0;
      display: grid;
      place-items: center;
    }

    .stage-wrap {
      width: min(92vw, 540px);
      max-height: calc(100vh - 86px);
      aspect-ratio: 9 / 16;
      display: grid;
      place-items: stretch;
      filter: drop-shadow(0 24px 60px rgba(0, 0, 0, .58));
    }

    body.controls-hidden .stage-wrap {
      max-height: calc(100vh - 24px);
    }

    .stage {
      position: relative;
      overflow: hidden;
      isolation: isolate;
      border: 1px solid rgba(201, 145, 47, .38);
      background:
        linear-gradient(180deg, rgba(0, 0, 0, .28), rgba(0, 0, 0, .82)),
        url("assets/events/resonance-awaken-backdrop.png") 50% 50% / cover no-repeat,
        #070504;
      animation: stage-camera 5.2s ease-in-out both;
    }

    .stage::before,
    .stage::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 1;
    }

    .stage::before {
      background:
        radial-gradient(ellipse at 50% 38%, rgba(255, 185, 75, .16), transparent 34%),
        radial-gradient(ellipse at 50% 54%, var(--res-primary), transparent 42%),
        linear-gradient(90deg, rgba(0,0,0,.82), rgba(0,0,0,.12) 48%, rgba(0,0,0,.82));
      opacity: .34;
      mix-blend-mode: screen;
      animation: stage-aura 3.4s ease-out both;
    }

    .stage::after {
      background:
        radial-gradient(ellipse at 50% 45%, transparent 28%, rgba(0,0,0,.36) 64%, rgba(0,0,0,.84) 100%),
        linear-gradient(180deg, rgba(0,0,0,.42), transparent 18%, transparent 66%, rgba(0,0,0,.88));
    }

    .stage-content {
      position: relative;
      z-index: 3;
      width: 100%;
      height: 100%;
      display: grid;
      grid-template-rows: minmax(120px, 18%) minmax(0, 1fr) minmax(210px, 28%);
      padding: 9% 7% 8%;
    }

    .stage-kicker,
    .stage-title,
    .stage-subtitle,
    .stage-bottom-card {
      text-shadow:
        0 3px 12px rgba(0,0,0,.86),
        0 0 18px var(--res-shadow);
    }

    .stage-heading {
      align-self: end;
      text-align: center;
      animation: text-rise .7s ease-out .16s both;
    }

    .stage-kicker {
      margin-bottom: 7px;
      color: rgba(255, 225, 154, .84);
      font-size: clamp(.82rem, 2.4vw, 1.08rem);
      font-weight: 900;
      letter-spacing: .2em;
    }

    .stage-title {
      margin: 0;
      color: #ffe7aa;
      font-family: "Noto Serif TC", "Microsoft JhengHei", serif;
      font-size: clamp(2rem, 8vw, 3.35rem);
      line-height: 1.08;
      letter-spacing: .08em;
    }

    .stage-title span {
      display: inline-block;
      filter:
        drop-shadow(0 0 12px var(--res-primary))
        drop-shadow(0 0 24px var(--res-shadow));
    }

    .stage-center {
      position: relative;
      display: grid;
      place-items: center;
      min-height: 0;
    }

    .stage-center::before,
    .stage-center::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      width: min(90%, 420px);
      aspect-ratio: 1;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      mix-blend-mode: screen;
      opacity: 0;
    }

    .stage-center::before {
      border: 1px solid color-mix(in srgb, var(--res-secondary) 60%, transparent);
      box-shadow:
        inset 0 0 28px var(--res-shadow),
        0 0 42px var(--res-primary);
      animation: stage-ring 2.4s ease-out .82s both;
    }

    .stage-center::after {
      width: min(76%, 340px);
      background:
        repeating-conic-gradient(from 12deg, transparent 0 13deg, color-mix(in srgb, var(--res-primary) 50%, transparent) 14deg 16deg, transparent 17deg 36deg),
        radial-gradient(circle, rgba(255, 235, 174, .22), transparent 62%);
      filter: blur(.3px);
      animation: stage-sigil 2.2s ease-out .64s both;
    }

    .stage-icon-scene {
      position: relative;
      width: min(78vw, 420px);
      max-width: 92%;
      aspect-ratio: 1;
      isolation: isolate;
      transform: translateZ(0);
    }

    .stage-icon-scene > span {
      position: absolute;
      left: 50%;
      top: 50%;
      pointer-events: none;
    }

    .stage-charge-sprite {
      z-index: 5;
      width: 110%;
      height: 110%;
      background: url("assets/effects/resonance-awaken-charge.png") 33.333% 0 / 400% 200% no-repeat;
      opacity: 0;
      mix-blend-mode: screen;
      filter:
        hue-rotate(var(--res-sprite-hue))
        brightness(calc(var(--res-charge-bright) * .9))
        contrast(1.04)
        saturate(calc(var(--res-sprite-sat) * .82))
        drop-shadow(0 0 16px rgba(255, 226, 114, .42))
        drop-shadow(0 0 36px var(--res-primary))
        drop-shadow(0 0 52px var(--res-shadow));
      animation:
        stage-charge-motion 1.18s cubic-bezier(.18, .82, .2, 1) both,
        stage-charge-frames 1.18s steps(1, end) both;
    }

    .stage-wave-sprite {
      z-index: 6;
      width: 118%;
      height: 118%;
      background: url("assets/effects/resonance-awaken-wave.png") 0 0 / 400% 200% no-repeat;
      opacity: 0;
      mix-blend-mode: screen;
      filter:
        hue-rotate(var(--res-sprite-hue))
        brightness(var(--res-wave-bright))
        saturate(calc(var(--res-sprite-sat) * .86))
        drop-shadow(0 0 20px rgba(255, 218, 104, .72))
        drop-shadow(0 0 42px var(--res-primary));
      animation:
        stage-wave-motion .86s cubic-bezier(.08, .74, .2, 1) .94s both,
        stage-wave-frames .86s steps(1, end) .94s both;
    }

    .stage-flash {
      z-index: 7;
      width: 82%;
      aspect-ratio: 1;
      border-radius: 50%;
      background:
        radial-gradient(circle, rgba(255,255,250,.98) 0 7%, rgba(255,226,116,.58) 18%, transparent 62%),
        conic-gradient(from 10deg, transparent 0 9deg, rgba(255,245,178,.92) 10deg 12deg, transparent 13deg 44deg);
      opacity: 0;
      mix-blend-mode: screen;
      filter: blur(.2px) drop-shadow(0 0 26px rgba(255, 228, 108, .78));
      animation: stage-flash .46s ease-out .94s both;
    }

    .stage-icon-core,
    .stage-icon-ghost {
      width: 46%;
      aspect-ratio: 1;
      transform: translate(-50%, -50%);
    }

    .stage-icon-core {
      z-index: 4;
      filter:
        drop-shadow(0 0 13px var(--res-primary))
        drop-shadow(0 0 34px var(--res-shadow));
      animation: stage-icon-core 2.25s cubic-bezier(.16, .78, .24, 1) both;
    }

    .stage-icon-ghost {
      z-index: 3;
      opacity: 0;
      mix-blend-mode: screen;
      filter: saturate(1.35) brightness(1.18) drop-shadow(0 0 28px var(--res-primary));
    }

    .stage-icon-ghost-a { animation: stage-ghost-a 1.1s ease-out .12s both; }
    .stage-icon-ghost-b { animation: stage-ghost-b 1.36s ease-out .28s both; }

    .stage-icon-core img,
    .stage-icon-ghost img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .stage-mote {
      z-index: 8;
      left: var(--x);
      top: var(--y);
      width: var(--s, 4px);
      height: var(--s, 4px);
      border-radius: 50%;
      background: var(--res-secondary);
      box-shadow: 0 0 14px var(--res-primary);
      opacity: 0;
      animation: stage-mote 1.3s ease-out var(--d) both;
    }

    .stage-bottom {
      align-self: end;
      display: grid;
      gap: 12px;
      text-align: center;
      animation: text-rise .78s ease-out 1.35s both;
    }

    .stage-subtitle {
      margin: 0 auto;
      max-width: 21em;
      color: #f3e2bd;
      font-size: clamp(1rem, 3.5vw, 1.4rem);
      line-height: 1.45;
      font-weight: 900;
    }

    .stage-bottom-card {
      margin: 0 auto;
      width: min(100%, 430px);
      padding: 13px 15px;
      border: 1px solid color-mix(in srgb, var(--res-primary) 45%, rgba(201,145,47,.24));
      background:
        linear-gradient(90deg, rgba(0,0,0,.72), rgba(0,0,0,.42)),
        radial-gradient(circle at 50% 0, color-mix(in srgb, var(--res-primary) 22%, transparent), transparent 62%);
      box-shadow:
        inset 0 0 20px rgba(0,0,0,.34),
        0 14px 34px rgba(0,0,0,.38);
    }

    .stage-bottom-card strong {
      display: block;
      margin-bottom: 4px;
      color: #ffe3a0;
      font-size: clamp(.98rem, 3vw, 1.2rem);
      letter-spacing: .08em;
    }

    .stage-bottom-card span {
      display: block;
      color: var(--muted);
      font-size: clamp(.82rem, 2.4vw, 1rem);
      line-height: 1.45;
    }

    .stage-border {
      position: absolute;
      inset: 10px;
      z-index: 10;
      pointer-events: none;
      border: 1px solid rgba(255, 226, 142, .22);
      box-shadow:
        inset 0 0 0 1px rgba(0,0,0,.62),
        inset 0 0 42px rgba(0,0,0,.52);
    }

    .stage-border::before,
    .stage-border::after {
      content: "";
      position: absolute;
      left: 50%;
      width: 42%;
      height: 1px;
      transform: translateX(-50%);
      background: linear-gradient(90deg, transparent, rgba(255,226,142,.55), transparent);
    }

    .stage-border::before { top: 12px; }
    .stage-border::after { bottom: 12px; }

    .stage.replay {
      animation: none;
    }

    .stage.replay * {
      animation: none !important;
    }

    @keyframes stage-camera {
      0% { background-position: 50% 48%; background-size: 112%; }
      100% { background-position: 50% 42%; background-size: 126%; }
    }

    @keyframes stage-aura {
      0% { opacity: .08; transform: scale(1); }
      42% { opacity: .44; }
      100% { opacity: .30; transform: scale(1.06); }
    }

    @keyframes stage-ring {
      0% { opacity: 0; transform: translate(-50%, -50%) scale(.35) rotate(0deg); }
      34% { opacity: .74; }
      100% { opacity: 0; transform: translate(-50%, -50%) scale(1.32) rotate(24deg); }
    }

    @keyframes stage-sigil {
      0% { opacity: 0; transform: translate(-50%, -50%) scale(.6) rotate(-18deg); }
      40% { opacity: .54; }
      100% { opacity: .08; transform: translate(-50%, -50%) scale(1.1) rotate(42deg); }
    }

    @keyframes stage-charge-motion {
      0% { opacity: 0; transform: translate(-50%, -50%) scale(1.52) rotate(-18deg); }
      14% { opacity: .16; transform: translate(-50%, -50%) scale(1.42) rotate(-8deg); }
      36% { opacity: .24; transform: translate(-50%, -50%) scale(1.08) rotate(10deg); }
      62% { opacity: .58; transform: translate(-50%, -50%) scale(.70) rotate(24deg); }
      82% { opacity: .88; transform: translate(-50%, -50%) scale(.43) rotate(32deg); }
      100% { opacity: .08; transform: translate(-50%, -50%) scale(.30) rotate(38deg); }
    }

    @keyframes stage-charge-frames {
      0% { background-position: 0 0; }
      12.5% { background-position: 33.333% 0; }
      25% { background-position: 66.666% 0; }
      37.5% { background-position: 100% 0; }
      50% { background-position: 0 100%; }
      62.5% { background-position: 33.333% 100%; }
      75% { background-position: 66.666% 100%; }
      87.5%, 100% { background-position: 100% 100%; }
    }

    @keyframes stage-wave-motion {
      0% { opacity: 0; transform: translate(-50%, -50%) scale(.24) rotate(-4deg); }
      12% { opacity: .92; transform: translate(-50%, -50%) scale(.36) rotate(0deg); }
      56% { opacity: .74; transform: translate(-50%, -50%) scale(1.18) rotate(6deg); }
      100% { opacity: 0; transform: translate(-50%, -50%) scale(1.78) rotate(9deg); }
    }

    @keyframes stage-wave-frames {
      0% { background-position: 0 0; }
      12.5% { background-position: 33.333% 0; }
      25% { background-position: 66.666% 0; }
      37.5% { background-position: 100% 0; }
      50% { background-position: 0 100%; }
      62.5% { background-position: 33.333% 100%; }
      75% { background-position: 66.666% 100%; }
      87.5%, 100% { background-position: 100% 100%; }
    }

    @keyframes stage-flash {
      0% { opacity: 0; transform: translate(-50%, -50%) scale(.32); }
      26% { opacity: .84; transform: translate(-50%, -50%) scale(.82); }
      100% { opacity: 0; transform: translate(-50%, -50%) scale(1.62); }
    }

    @keyframes stage-icon-core {
      0% { opacity: 0; transform: translate(-50%, -50%) scale(.58) rotate(-8deg); }
      28% { opacity: .82; transform: translate(-50%, -50%) scale(.92) rotate(0deg); }
      64% { opacity: 1; transform: translate(-50%, -50%) scale(1.10) rotate(2deg); }
      100% { opacity: 1; transform: translate(-50%, -50%) scale(1) rotate(0deg); }
    }

    @keyframes stage-ghost-a {
      0% { opacity: 0; transform: translate(-50%, -50%) scale(.9); }
      35% { opacity: .42; }
      100% { opacity: 0; transform: translate(-50%, -50%) scale(1.42) rotate(8deg); }
    }

    @keyframes stage-ghost-b {
      0% { opacity: 0; transform: translate(-50%, -50%) scale(.82); }
      38% { opacity: .28; }
      100% { opacity: 0; transform: translate(-50%, -50%) scale(1.65) rotate(-12deg); }
    }

    @keyframes stage-mote {
      0% { opacity: 0; transform: translate(-50%, -50%) scale(.4); }
      26% { opacity: .94; }
      100% { opacity: 0; transform: translate(calc(-50% + var(--mx, 0px)), calc(-50% + var(--my, -34px))) scale(1.4); }
    }

    @keyframes text-rise {
      0% { opacity: 0; transform: translateY(18px); filter: blur(5px); }
      100% { opacity: 1; transform: translateY(0); filter: blur(0); }
    }

    @media (max-width: 760px) {
      .app { padding: 8px; }
      .stage-wrap { width: min(96vw, 470px); }
      .stage-content { padding: 8% 6% 7%; }
      .toolbar { font-size: .92rem; }
      select { min-width: 150px; }
    }
  </style>
</head>
<body>

    <div class="toolbar">
      <label>共鳴
        <select id="resonance-select"></select>
      </label>
      <button id="replay-btn" type="button">重播</button>
      <label><input id="sound-toggle" type="checkbox" checked> 音效</label>
      <button id="hide-controls-btn" type="button">隱藏控制列</button>
    </div>

    <main class="workspace">
      <div class="stage-wrap">
        <section class="stage" id="stage" aria-label="錄影用動畫舞台"></section>
      </div>
    </main>
  </div>

        sfx: 'assets/audio/sfx/resonance-star-breaker-eye.wav',
        volume: 0.5,
        theme: { key: 'breaker', primary: 'rgba(255, 70, 54, .9)', secondary: 'rgba(255, 214, 90, .78)', shadow: 'rgba(96, 10, 10, .52)', hue: '-8deg', sat: 1.95, charge: 1.56, wave: 1.16 },
      },
      {
        id: 'dual_banner_formation',
        name: '雙旗戰陣',
        subtitle: '兩面旗在黑夜中並立，戰線因此被重新畫下。',
        desc: '戰爭旗 + 鷹眼旗，其中一面已融合',
        iconImage: 'assets/relics/dual-banner-formation-resonance.png',
        sfx: 'assets/audio/sfx/resonance-dual-banner.wav',
        volume: 0.48,
        theme: { key: 'banner', primary: 'rgba(230, 42, 42, .88)', secondary: 'rgba(255, 220, 106, .74)', shadow: 'rgba(82, 12, 8, .5)', hue: '88deg', sat: 1.34, charge: 1.44, wave: 1.1 },
      },
    ];

    const el = {
      stage: document.getElementById('stage'),
      select: document.getElementById('resonance-select'),
      replay: document.getElementById('replay-btn'),
      sound: document.getElementById('sound-toggle'),
      hide: document.getElementById('hide-controls-btn'),
    };
    const audioCache = new Map();
    let replayTimer = 0;

    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function applyTheme(res) {
      const t = res.theme;
      document.documentElement.style.setProperty('--res-primary', t.primary);
      document.documentElement.style.setProperty('--res-secondary', t.secondary);
      document.documentElement.style.setProperty('--res-shadow', t.shadow);
      document.documentElement.style.setProperty('--res-sprite-hue', t.hue);
      document.documentElement.style.setProperty('--res-sprite-sat', t.sat);
      document.documentElement.style.setProperty('--res-charge-bright', t.charge);
      document.documentElement.style.setProperty('--res-wave-bright', t.wave);
    }

    function stageHtml(res) {
      const src = escapeHtml(res.iconImage);
      return `
        <div class="stage-border" aria-hidden="true"></div>
        <div class="stage-content">
          <header class="stage-heading">
            <div class="stage-kicker">聖物共鳴啟動</div>
            <h1 class="stage-title"><span>${escapeHtml(res.name)}</span></h1>
          </header>
          <div class="stage-center">
            <div class="stage-icon-scene">
              <span class="stage-charge-sprite"></span>
              <span class="stage-wave-sprite"></span>
              <span class="stage-flash"></span>
              <span class="stage-icon-ghost stage-icon-ghost-a"><img src="${src}" alt=""></span>
              <span class="stage-icon-ghost stage-icon-ghost-b"><img src="${src}" alt=""></span>
              <span class="stage-icon-core"><img src="${src}" alt="${escapeHtml(res.name)}"></span>
              ${motesHtml()}
            </div>
          </div>
          <footer class="stage-bottom">
            <p class="stage-subtitle">${escapeHtml(res.subtitle)}</p>
            <div class="stage-bottom-card">
              <strong>${escapeHtml(res.desc)}</strong>
              <span>聖物彼此回應，沉睡的力量在這一刻成形。</span>
            </div>
          </footer>
        </div>
      `;
    }

    function motesHtml() {
      const motes = [
        ['18%', '45%', '90ms', '-18px', '-68px', '4px'],
        ['26%', '24%', '260ms', '-54px', '-42px', '3px'],
        ['72%', '28%', '190ms', '48px', '-58px', '4px'],
        ['84%', '52%', '310ms', '58px', '-16px', '3px'],
        ['36%', '72%', '420ms', '-30px', '42px', '4px'],
        ['62%', '76%', '360ms', '40px', '46px', '3px'],
      ];
      return motes.map(([x, y, d, mx, my, s]) =>
        `<span class="stage-mote" style="--x:${x};--y:${y};--d:${d};--mx:${mx};--my:${my};--s:${s}"></span>`
      ).join('');
    }

    function selectedResonance() {
      return resonances.find(res => res.id === el.select.value) || resonances[0];
    }

    function preloadAudio(res) {
      if (!res?.sfx || audioCache.has(res.sfx)) return;
      const audio = new Audio(res.sfx);
      audio.preload = 'auto';
      try { audio.load(); } catch (err) {}
      audioCache.set(res.sfx, audio);
    }

    function playSfx(res) {
      if (!el.sound.checked || !res?.sfx) return;
      preloadAudio(res);
      const base = audioCache.get(res.sfx);
      const audio = base?.cloneNode?.() || new Audio(res.sfx);
      audio.volume = res.volume ?? .48;
      audio.play().catch(() => {});
    }

    function replay() {
      const res = selectedResonance();
      clearTimeout(replayTimer);
      applyTheme(res);
      el.stage.classList.add('replay');
      el.stage.innerHTML = stageHtml(res);
      void el.stage.offsetWidth;
      el.stage.classList.remove('replay');
      replayTimer = setTimeout(() => playSfx(res), 940);
    }

    function init() {
      el.select.innerHTML = resonances.map(res => `<option value="${res.id}">${escapeHtml(res.name)}</option>`).join('');
      for (const res of resonances) preloadAudio(res);
      el.select.addEventListener('change', replay);
      el.replay.addEventListener('click', replay);
      el.hide.addEventListener('click', () => {
        document.body.classList.toggle('controls-hidden');
        el.hide.textContent = document.body.classList.contains('controls-hidden') ? '顯示控制列' : '隱藏控制列';
      });
      window.addEventListener('keydown', event => {
        if (event.key === ' ') {
          event.preventDefault();
          replay();
        }
        if (event.key.toLowerCase() === 'h') {
          document.body.classList.toggle('controls-hidden');
        }
      });
      replay();
    }

    init();
  </script>
</body>
</html>
