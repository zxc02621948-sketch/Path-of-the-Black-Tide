<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>黑潮之途</title>
  <meta name="description" content="帶領小隊踏上黑潮之途，在白日遠征與黑夜追獵之間，打造屬於你的聖物流派。">
  <meta property="og:title" content="黑潮之途">
  <meta property="og:description" content="白日遠征，黑夜追獵。打造聖物流派，踏上黑潮之途。">
  <meta property="og:image" content="assets/title-logo.png">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="黑潮之途">
  <meta name="twitter:description" content="白日遠征，黑夜追獵。打造聖物流派，踏上黑潮之途。">
  <meta name="twitter:image" content="assets/title-logo.png">

  <link rel="apple-touch-icon" href="assets/site-thumbnail.png">

  <link rel="preload" as="image" href="assets/title-logo.png" fetchpriority="high">
  <link rel="preload" as="image" href="assets/ui/modal-panel-frame.png">
  <link rel="preload" as="image" href="assets/ui/choice-button-frame.png">
  <link rel="preload" as="image" href="assets/effects/damage-digits/0.png">
  <link rel="preload" as="image" href="assets/effects/damage-digits/1.png">
  <link rel="preload" as="image" href="assets/effects/damage-digits/2.png">
  <link rel="preload" as="image" href="assets/effects/damage-digits/3.png">
  <link rel="preload" as="image" href="assets/effects/damage-digits/4.png">
  <link rel="preload" as="image" href="assets/effects/damage-digits/5.png">

<body>
<div id="app">

  <!-- ═══════════════ 開始畫面 ═══════════════ -->
  <div id="start-screen" class="screen active">
    <div class="start-bg" aria-hidden="true"></div>
    <div class="start-shell">
      <section class="title-card">
        <div class="title-kicker">PATH OF THE BLACK TIDE</div>
        <h1 class="game-title">
          <img src="assets/title-logo.png" alt="黑潮之途">
          <span class="logo-mist" aria-hidden="true"></span>
        </h1>
        <p class="game-subtitle">
          黑潮正在吞沒邊境，黑夜裡有什麼東西正循著你的足跡靠近。你能帶著小隊，順利熬過這個黑夜嗎？
        </p>
        <div class="start-actions">
          <button id="btn-new-game" class="btn-primary">開始探索</button>
          <button id="btn-notes-start" class="btn-secondary">探險筆記</button>
        </div>
      </section>

      <aside class="start-brief">
        <div class="brief-item">
          <span class="brief-num">01</span>
          <span><b>聖物構築</b>每件聖物都會改變戰鬥節奏，組合後能形成不同流派。</span>
        </div>
        <div class="brief-item">
          <span class="brief-num">02</span>
          <span><b>黑暗化身</b>第十日後，黑夜不再退去，黑暗化身會在地圖上逼近小隊。</span>
        </div>
        <div class="brief-item">
          <span class="brief-num">03</span>
          <span><b>隊伍抉擇</b>救援、融合、撤離或深入，每次選擇都會影響這趟旅程。</span>
        </div>
      </aside>
    </div>
  </div>

  <!-- ═══════════════ 遊戲畫面 ═══════════════ -->
  <div id="game-screen" class="screen" style="display:none">

    <!-- 頂部狀態列 -->
    <div id="top-bar">
      <div id="day-display">
        <span id="day-label">第 <span id="day-num">1</span> 天</span>
        <span id="phase-label" class="phase-day">白日探索期</span>
      </div>
      <div id="actions-display" class="actions-display">
        <span class="actions-label">行動力</span>
        <span class="action-pips" aria-hidden="true">
          <span class="action-pip filled"></span>
          <span class="action-pip filled"></span>
          <span class="action-pip filled"></span>
        </span>
        <span class="actions-count"><span id="actions-left">3</span>&thinsp;/&thinsp;3</span>
        <span id="actions-hint" class="actions-hint">選擇相鄰格</span>
        <button id="btn-field-rest" class="btn-small">原地休息</button>
        <button id="btn-end-day" class="btn-small">結束今天</button>
      </div>
      <div id="darkness-display">
        <span id="darkness-label">黑暗</span><span id="darkness-num"></span>
        <span id="light-charges-display"></span>
        <div class="darkness-bar"><div id="darkness-bar-fill"></div></div>
      </div>
      <div id="top-controls">
        <button id="btn-open-log" class="btn-small">日誌</button>
        <button id="btn-open-notes" class="btn-small">探險筆記</button>
        <button id="btn-dev-tool" class="btn-small dev-tool-btn">測試工具</button>
      </div>
    </div>

    <!-- 主體 -->
    <div id="main-content">

      <!-- 左側：日誌面板 -->
      <div id="log-panel">
        <div class="log-panel-title">
          <span>日誌</span>
          <button id="btn-close-log" class="log-panel-close" type="button">關閉</button>
        </div>
        <div id="log-messages"></div>
      </div>

      <!-- 中間：地圖面板 -->
      <div id="map-panel">
        <button id="turn-end-float" class="turn-end-float" type="button" aria-live="polite">
          行動力已用完，請結束今天
        </button>
        <div id="map-viewport">
          <div id="map-grid"></div>
        </div>
        <div id="map-hint">點擊相鄰格子移動探索</div>
      </div>

      <!-- 右側面板 -->
      <div id="right-panel">
        <div id="squad-panel">
          <h3>小隊</h3>
          <div id="squad-list"></div>
        </div>

        <div id="effects-panel" style="display:none">
          <!-- 由 render.js 填入 -->
        </div>

        <div id="resonance-panel" style="display:none">
          <!-- 由 render.js 填入 -->
        </div>

      </div>
    </div>

  </div><!-- /#game-screen -->

  <!-- ═══════════════ 事件 Modal ═══════════════ -->
  <div id="event-modal" class="modal hidden">
    <div class="modal-content">
      <h2 id="modal-title"></h2>
      <div id="modal-desc"></div>
      <div id="modal-choices"></div>
    </div>
  </div>

  <!-- ═══════════════ 選角 Modal ═══════════════ -->
  <div id="squad-select-modal" class="modal hidden">
    <div class="modal-content squad-select-layout">
      <div class="squad-select-detail" id="squad-detail-left">
        <div class="char-detail-placeholder">將滑鼠移到角色卡上</div>
      </div>
      <div class="squad-select-center">
        <h2>選擇起始角色</h2>
        <p style="color:var(--text-dim);font-size:.9em;margin-bottom:16px">
          選擇 2 人（最多可帶 3 人，另一名可在探索中救援）
        </p>
        <div id="squad-select"></div>
        <div id="library-start-summary" class="library-start-summary hidden"></div>
        <button id="btn-open-library-select" class="btn-secondary library-start-button" type="button">開啟聖物庫</button>
        <div class="squad-actions">
          <button id="btn-confirm-squad" class="btn-primary" disabled>確認出發</button>
          <button id="btn-cancel-squad" class="btn-secondary">返回</button>
        </div>
      </div>
      <div class="squad-select-detail" id="squad-detail-right">
        <div class="char-detail-placeholder">選擇第二位角色後顯示</div>
      </div>
    </div>
  </div>

  <!-- ═══════════════ 聖物庫 Modal ═══════════════ -->
  <div id="library-select-modal" class="modal hidden">
    <div class="modal-content library-select-modal-content">
      <h2>聖物庫</h2>
      <div id="library-select-content"></div>
      <div class="library-select-actions">
        <button id="btn-close-library-select" class="btn-secondary" type="button">返回選角</button>
      </div>
    </div>
  </div>

  <!-- ═══════════════ 筆記 Modal ═══════════════ -->
  <div id="notes-modal" class="modal hidden">
    <div class="modal-content wide">
      <h2>探險筆記</h2>
      <div id="notes-content"></div>
      <button id="btn-close-notes" class="btn-secondary" style="margin-top:16px">關閉</button>
    </div>
  </div>

  <!-- ═══════════════ 結束畫面 ═══════════════ -->
  <div id="gameover-screen" class="screen" style="display:none">
    <div class="title-card">
      <h2 id="gameover-title"></h2>
      <p id="gameover-desc"></p>
      <div id="gameover-results"></div>
      <button id="btn-restart" class="btn-primary">再來一局</button>
    </div>
  </div>

  <!-- 黑夜過渡蓋層 -->
  <div id="day-transition-overlay" class="day-transition-overlay" aria-hidden="true"></div>
  <div id="night-overlay"></div>
  <div id="gameover-intro" class="gameover-intro" aria-hidden="true"></div>

</div><!-- /#app -->
