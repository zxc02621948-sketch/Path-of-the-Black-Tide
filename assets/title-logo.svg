<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 220" role="img" aria-labelledby="title desc">
  <title id="title">黑夜邊境</title>
  <desc id="desc">黑夜邊境遊戲標題造型字</desc>
  <defs>
    <linearGradient id="titleFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffe0a2"/>
      <stop offset="0.44" stop-color="#c9890a"/>
      <stop offset="1" stop-color="#6e3f13"/>
    </linearGradient>
    <linearGradient id="edgeGlow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#70b2a6" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#70b2a6" stop-opacity=".75"/>
      <stop offset="1" stop-color="#70b2a6" stop-opacity="0"/>
    </linearGradient>
    <filter id="shadow" x="-8%" y="-30%" width="116%" height="170%">
      <feDropShadow dx="0" dy="10" stdDeviation="8" flood-color="#000000" flood-opacity=".9"/>
      <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#c9890a" flood-opacity=".28"/>
      <feDropShadow dx="0" dy="0" stdDeviation="18" flood-color="#70b2a6" flood-opacity=".16"/>
    </filter>
    <filter id="mist" x="-10%" y="-60%" width="120%" height="220%">
      <feGaussianBlur stdDeviation="11"/>
    </filter>
  </defs>

  <rect x="77" y="155" width="766" height="2.5" fill="url(#edgeGlow)" opacity=".85"/>
  <rect x="168" y="44" width="584" height="1.5" fill="url(#edgeGlow)" opacity=".45"/>

  <g opacity=".32" filter="url(#mist)">
    <ellipse cx="460" cy="143" rx="312" ry="31" fill="#70b2a6"/>
    <ellipse cx="460" cy="83" rx="260" ry="18" fill="#c9890a"/>
  </g>

  <text x="460" y="136"
        text-anchor="middle"
        font-family="'Noto Serif TC', 'Source Han Serif TC', 'PMingLiU', serif"
        font-size="106"
        font-weight="900"
        letter-spacing="10"
        fill="none"
        stroke="#0b0b0a"
        stroke-width="12"
        stroke-linejoin="round"
        filter="url(#shadow)">黑夜邊境</text>

  <text x="460" y="136"
        text-anchor="middle"
        font-family="'Noto Serif TC', 'Source Han Serif TC', 'PMingLiU', serif"
        font-size="106"
        font-weight="900"
        letter-spacing="10"
        fill="url(#titleFill)"
        stroke="#f6d58a"
        stroke-width="1.4"
        stroke-linejoin="round">黑夜邊境</text>

  <path d="M112 166 C226 190 340 196 460 196 C580 196 694 190 808 166"
        fill="none"
        stroke="#25190c"
        stroke-width="8"
        stroke-linecap="round"
        opacity=".82"/>
  <path d="M134 163 C240 181 348 186 460 186 C572 186 680 181 786 163"
        fill="none"
        stroke="url(#edgeGlow)"
        stroke-width="2.5"
        stroke-linecap="round"
        opacity=".9"/>

  <g fill="#70b2a6" opacity=".82">
    <circle cx="196" cy="161" r="3"/>
    <circle cx="724" cy="161" r="3"/>
    <path d="M459 171 l8 13 l-8 13 l-8 -13z"/>
  </g>
</svg>
